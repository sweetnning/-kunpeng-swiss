<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bold Signal 预览</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a1a1a;--card:#FF5722;--text:#fff;--text-on-card:#1a1a1a}
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);background-image:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 50%,#1a1a1a 100%);font-family:'Space Grotesk','Noto Sans SC',sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center}
.card{background:var(--card);padding:clamp(40px,6vh,80px) clamp(32px,5vw,80px);width:clamp(320px,60vw,800px);position:relative}
.card .num{font-family:'Archivo Black',sans-serif;font-size:clamp(6rem,12vw,14rem);line-height:.8;color:var(--text-on-card);position:absolute;top:-30px;left:20px;opacity:.15}
.card .tag{font-size:clamp(10px,.7vw,13px);text-transform:uppercase;letter-spacing:.2em;margin-bottom:clamp(10px,2vh,20px);color:rgba(0,0,0,.6)}
.card h1{font-family:'Archivo Black','Noto Sans SC',sans-serif;font-size:clamp(2.5rem,6vw,5rem);line-height:.9;color:var(--text-on-card);margin-bottom:clamp(8px,1.5vh,16px)}
.card p{font-size:clamp(14px,1vw,18px);color:rgba(0,0,0,.7);max-width:500px;line-height:1.5}
</style></head><body>
<div class="card">
  <div class="num">01</div>
  <div class="tag">Brand Strategy · Investor Deck</div>
  <h1>鲲鹏 IP<br>品牌战略</h1>
  <p>深圳科技馆（光明新馆）· 从"一个馆"到"一个品牌生态"</p>
</div>
</body></html>
